<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ホームページ制作ヒアリングフォーム</title>
    <meta
      name="description"
      content="ホームページ制作の初回相談に向けたヒアリングフォームです。"
    />
    <link rel="stylesheet" href="./styles.css?v=20260601-fullscreen-management" />
  </head>
  <body>
    <main class="app-shell">
      <section class="form-panel" aria-labelledby="form-title">
        <header class="app-header">
          <p class="eyebrow">WEB SITE PROJECT BRIEF</p>
          <h1 id="form-title">制作に必要な情報をご入力ください</h1>
          <p class="lead">
            ご記入可能な範囲で問題ありません。未定の項目は、後日の打ち合わせで確認します。
          </p>
        </header>

        <div class="progress-wrap" aria-label="入力の進み具合">
          <div class="progress-meta progress-meta-hidden" aria-hidden="true">
            <span id="step-count">1 / 11</span>
            <span id="save-status" class="save-status">未送信</span>
          </div>
          <div class="progress-track hidden" aria-hidden="true">
            <div id="progress-bar" class="progress-bar"></div>
          </div>
          <nav id="step-jump-nav" class="step-jump-nav" aria-label="入力ページを選択"></nav>
        </div>
        <section id="review-needed-panel" class="review-needed-panel hidden" aria-label="打ち合わせで確認する項目"></section>

        <form id="hearing-form" novalidate>
          <div class="hp-field" aria-hidden="true">
            <label for="hp-website">ウェブサイト</label>
            <input type="text" id="hp-website" name="website" tabindex="-1" autocomplete="off">
          </div>
          <div id="step-root"></div>

          <div id="form-error" class="form-error hidden" role="alert"></div>

          <nav class="form-actions" aria-label="フォーム操作">
            <button type="button" class="button secondary" id="prev-button">前へ戻る</button>
            <button type="button" class="button primary" id="next-button">次へ進む</button>
          </nav>
        </form>
      </section>
    </main>

    <div id="help-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="help-title">
      <button type="button" class="modal-backdrop" id="help-backdrop" aria-label="閉じる"></button>
      <section class="modal-sheet">
        <div class="modal-header">
          <h2 id="help-title">詳しく見る</h2>
          <button type="button" class="icon-button" id="help-close" aria-label="閉じる">×</button>
        </div>
        <div id="help-body" class="modal-body"></div>
      </section>
    </div>

    <script src="./config.js?v=20260525"></script>
    <script src="./app.js?v=20260601-fullscreen-management"></script>
  </body>
</html>
